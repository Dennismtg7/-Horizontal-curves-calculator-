<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizontal Curve Setting Out Calculator</title>
<link rel="stylesheet" href="mtg7-appbar.css">

<style>
:root {
  --bg: #f4f7fc;
  --surface: #eaf0f9;
  --card: #ffffff;
  --border: #c5d5ea;
  --glow: #0066bb;
  --gold: #8a6200;
  --green: #006b3c;
  --red: #cc2233;
  --purple: #7a3db8;
  --text: #1b2a41;
  --muted: #5a7090;
  --white: #0f1f35;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Times New Roman", Times, serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
header {
  position: relative;
  z-index: 10;
  padding: 36px 24px 28px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,212,255,0.05) 0%, transparent 100%);
}
.header-badge {
  display: inline-block;
  font-family: "Times New Roman", Times, serif;
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--glow);
  border: 1px solid var(--glow);
  padding: 4px 16px;
  border-radius: 20px;
  margin-bottom: 14px;
  text-transform: uppercase;
  box-shadow: 0 0 12px rgba(0,212,255,0.2);
}
header h1 {
  font-family: "Times New Roman", Times, serif;
  font-size: clamp(20px, 4vw, 38px);
  font-weight: 900;
  color: var(--white);
  letter-spacing: 2px;
  line-height: 1.2;
}
header h1 span { color: var(--glow); text-shadow: 0 0 20px rgba(0,212,255,0.5); }
.header-sub {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
  font-family: "Times New Roman", Times, serif;
  letter-spacing: 2px;
}

/* LAYOUT */
.wrapper {
  position: relative;
  z-index: 10;
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 16px;
}

/* INPUT PANEL */
.input-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: 3px solid var(--glow);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 24px;
  box-shadow: 0 0 40px rgba(0,212,255,0.05);
}
.panel-title {
  font-family: "Times New Roman", Times, serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--glow);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.input-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field label {
  font-family: "Times New Roman", Times, serif;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.field input, .field select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  color: var(--white);
  font-family: "Times New Roman", Times, serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}
.field input:focus, .field select:focus {
  border-color: var(--glow);
  box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
}
.field input::placeholder { color: var(--muted); }
.field select option { background: var(--surface); }

/* METHOD CHECKBOXES */
.methods-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
  margin-bottom: 22px;
}
.method-cb {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.method-cb:hover { border-color: var(--glow); background: rgba(0,212,255,0.05); }
.method-cb input[type=checkbox] { display: none; }
.cb-box {
  width: 18px; height: 18px;
  border: 2px solid var(--muted);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.method-cb input:checked + .cb-box {
  background: var(--glow);
  border-color: var(--glow);
}
.method-cb input:checked + .cb-box::after { content: '✓'; font-size: 11px; color: #fff; font-weight: 900; }
.cb-label { font-size: 13px; color: var(--text); font-weight: 400; }
.cb-num {
  margin-left: auto;
  font-family: "Times New Roman", Times, serif;
  font-size: 10px;
  color: var(--muted);
  background: var(--border);
  padding: 2px 7px;
  border-radius: 10px;
}

/* BUTTONS */
.btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
.btn {
  padding: 13px 28px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-family: "Times New Roman", Times, serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-primary {
  background: var(--glow);
  color: #fff;
  box-shadow: 0 0 20px rgba(0,102,187,0.2);
}
.btn-primary:hover { box-shadow: 0 0 30px rgba(0,212,255,0.6); transform: translateY(-1px); }
.btn-secondary {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
}
.btn-secondary:hover { background: rgba(255,209,102,0.1); }
.btn-danger {
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
}
.btn-danger:hover { background: rgba(255,71,87,0.1); }
.btn-print {
  background: transparent;
  border: 1px solid var(--green);
  color: var(--green);
}
.btn-print:hover { background: rgba(6,255,165,0.1); }

/* PRELIM RESULTS */
.prelim-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.prelim-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.prelim-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--glow);
}
.prelim-card .pv {
  font-family: "Times New Roman", Times, serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--glow);
}
.prelim-card .pl {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 4px;
  font-family: "Times New Roman", Times, serif;
}
.prelim-card .pf {
  font-size: 10px;
  color: var(--border);
  margin-top: 5px;
  font-family: "Times New Roman", Times, serif;
}

/* OUTPUT SECTION */
.output-section { margin-bottom: 32px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.section-num {
  width: 36px; height: 36px;
  background: var(--glow);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Times New Roman", Times, serif;
  font-size: 14px;
  font-weight: 900;
  flex-shrink: 0;
}
.section-title {
  font-family: "Times New Roman", Times, serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 1px;
}
.section-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* TABLE */
.tbl-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 500px;
}
thead tr { background: rgba(0,212,255,0.08); }
th {
  padding: 11px 14px;
  text-align: left;
  font-family: "Times New Roman", Times, serif;
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--glow);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  white-space: nowrap;
}
th:last-child { border-right: none; }
td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  font-family: "Times New Roman", Times, serif;
  font-size: 12.5px;
  white-space: nowrap;
}
td:last-child { border-right: none; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(0,212,255,0.03); }
.td-hi { color: var(--glow); font-weight: 600; }
.td-gold { color: var(--gold); }
.td-green { color: var(--green); }
.td-red { color: var(--red); }
.td-t1t2 { background: rgba(0,212,255,0.07) !important; }

/* NOTE BOX */
.note-box {
  background: rgba(255,209,102,0.07);
  border: 1px solid rgba(255,209,102,0.25);
  border-left: 3px solid var(--gold);
  border-radius: 6px;
  padding: 12px 16px;
  font-size: 12.5px;
  color: var(--gold);
  margin-top: 12px;
  font-family: "Times New Roman", Times, serif;
}

/* CHECK BADGE */
.check-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(6,255,165,0.1);
  border: 1px solid rgba(6,255,165,0.3);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 11px;
  color: var(--green);
  font-family: "Times New Roman", Times, serif;
  margin-top: 10px;
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-family: "Times New Roman", Times, serif; font-size: 13px; letter-spacing: 1px; }

/* PRINT STYLES */
@media print {
  body { background: white; color: black; }
  body::before { display: none; }
  header { border-bottom: 2px solid #000; }
  .input-panel, .btn-row, .methods-grid { display: none; }
  .prelim-card { border: 1px solid #ccc; }
  .prelim-card .pv { color: #005a8e; }
  th { color: #005a8e; background: #e8f4fb; }
  td { color: #000; }
  .tbl-wrap { border: 1px solid #ccc; }
  .td-hi { color: #005a8e; }
  .td-green { color: #006b3c; }
  .section-num { background: #005a8e; }
  .section-title { color: #000; }
  .note-box { border-color: #c8a000; color: #7a5f00; background: #fffbea; }
}
</style>
</head>
<body>

<header>
  <div class="header-badge">EGE 2309 · Geomatic Engineering · JKUAT</div>
  <h1>HORIZONTAL CURVE<br><span>SETTING OUT CALCULATOR</span></h1>
  <p class="header-sub">All Methods &nbsp;|&nbsp; Auto Table Generator</p>
</header>

<div class="wrapper">

  <!-- INPUT PANEL -->
  <div class="input-panel">
    <div class="panel-title">▸ Curve Parameters Input</div>
    <div class="input-grid">
      <div class="field">
        <label>Radius R (m)</label>
        <input type="number" id="R" placeholder="e.g. 210" value="210" min="1" step="any" oninput="autoCalcT1()">
      </div>
      <div class="field" style="grid-column: span 2;">
        <label>Deflection Angle θ (D° M' S")</label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="number" id="theta_d" placeholder="°" value="70" min="0" max="179" step="1" style="width:70px;flex-shrink:0;" oninput="autoCalcT1();calculate()">
          <span style="color:var(--muted);font-size:13px;">°</span>
          <input type="number" id="theta_m" placeholder="'" value="0" min="0" max="59" step="1" style="width:65px;flex-shrink:0;" oninput="autoCalcT1();calculate()">
          <span style="color:var(--muted);font-size:13px;">'</span>
          <input type="number" id="theta_s" placeholder='"' value="0" min="0" max="59.9" step="0.1" style="width:72px;flex-shrink:0;" oninput="autoCalcT1();calculate()">
          <span style="color:var(--muted);font-size:13px;">"</span>
        </div>
      </div>
      <div class="field">
        <label>Chainage of Intersection I (m)</label>
        <input type="number" id="ch_I" placeholder="e.g. 500" step="any" oninput="autoCalcT1()">
      </div>
      <div class="field">
        <label>Chainage of T1 (m)</label>
        <input type="number" id="ch_t1" placeholder="e.g. 0" value="0" min="0" step="any">
      </div>
      <div class="field">
        <label>Chord Interval (m)</label>
        <input type="number" id="interval" placeholder="e.g. 5" value="5" min="0.1" step="any">
      </div>
      <div class="field">
        <label>Bearing of T1→I (degrees)</label>
        <input type="number" id="bearing" placeholder="e.g. 0" value="0" min="0" max="360" step="any">
      </div>
      <div class="field">
        <label>Easting of T1 (m)</label>
        <input type="number" id="E_t1" placeholder="e.g. 1000" value="1000" step="any">
      </div>
      <div class="field">
        <label>Northing of T1 (m)</label>
        <input type="number" id="N_t1" placeholder="e.g. 2000" value="2000" step="any">
      </div>
      <div class="field">
        <label>Curve Direction</label>
        <select id="direction">
          <option value="right">Right (Deflects Right)</option>
          <option value="left">Left (Deflects Left)</option>
        </select>
      </div>
    </div>

    <div class="panel-title">▸ Select Methods to Compute</div>
    <div class="methods-grid">
      <label class="method-cb"><input type="checkbox" class="method-check" value="1" checked><span class="cb-box"></span><span class="cb-label">Offsets from Tangent</span><span class="cb-num">M1</span></label>
      <label class="method-cb"><input type="checkbox" class="method-check" value="2" checked><span class="cb-box"></span><span class="cb-label">Offsets from Long Chord</span><span class="cb-num">M2</span></label>
      <label class="method-cb"><input type="checkbox" class="method-check" value="3" checked><span class="cb-box"></span><span class="cb-label">Deflection Angles (Two Theodolites)</span><span class="cb-num">M3</span></label>
      <label class="method-cb"><input type="checkbox" class="method-check" value="4" checked><span class="cb-box"></span><span class="cb-label">Deflection Angles + Sub-Chords</span><span class="cb-num">M4</span></label>
      <label class="method-cb"><input type="checkbox" class="method-check" value="5" checked><span class="cb-box"></span><span class="cb-label">Deflection Angles + EDM Chords</span><span class="cb-num">M5</span></label>
      <label class="method-cb"><input type="checkbox" class="method-check" value="6" checked><span class="cb-box"></span><span class="cb-label">Coordinates (E, N)</span><span class="cb-num">M6</span></label>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="calculate()">⚡ COMPUTE ALL</button>
      <button class="btn btn-secondary" onclick="window.print()">🖨 PRINT / SAVE PDF</button>
      <button class="btn btn-print" onclick="exportCSV()">📥 EXPORT CSV</button>
      <button class="btn btn-secondary" id="saveToDashboardBtn">💾 SAVE TO DASHBOARD</button>
      <button class="btn btn-danger" onclick="resetAll()">↺ RESET</button>
    </div>
  </div>

  <!-- OUTPUT AREA -->
  <div id="output">
    <div class="empty-state">
      <div class="icon">📐</div>
      <p>Enter curve parameters and click COMPUTE ALL to generate setting out tables</p>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// UTILITY FUNCTIONS
// ══════════════════════════════════════════════

const toRad = d => d * Math.PI / 180;
const toDeg = r => r * 180 / Math.PI;

function dmsStr(decDeg) {
  const neg = decDeg < 0;
  const d = Math.abs(decDeg);
  const deg = Math.floor(d);
  const mf = (d - deg) * 60;
  const min = Math.floor(mf);
  const sec = Math.round((mf - min) * 60);
  const s = sec >= 60 ? `${min+1}° 00' 00"` : `${deg}° ${String(min).padStart(2,'0')}' ${String(sec).padStart(2,'0')}"`;
  return (neg ? '-' : '') + s;
}

function dmsFromSec(totalSec) {
  const deg = Math.floor(totalSec / 3600);
  const rem = totalSec % 3600;
  const min = Math.floor(rem / 60);
  const sec = Math.round(rem % 60);
  return `${deg}° ${String(min).padStart(2,'0')}' ${String(sec).padStart(2,'0')}"`;
}

function addDms(a, b) { return a + b; }

function fmt(n, dp=3) { return isNaN(n) ? '—' : n.toFixed(dp); }

// Format chainage as 0+000.000
function fmtCh(n) {
  if (isNaN(n)) return '—';
  const km = Math.floor(n / 1000);
  const m  = (n % 1000).toFixed(3).padStart(7, '0');
  return `${km}+${m}`;
}

// Convert decimal degrees to total seconds
const toSec = d => d * 3600;

// Format dms from decimal degrees properly
function fmtDMS(decDeg) {
  if (isNaN(decDeg)) return '—';
  const abs = Math.abs(decDeg);
  const deg = Math.floor(abs);
  const mf = (abs - deg) * 60;
  const min = Math.floor(mf);
  const sec = (mf - min) * 60;
  const secR = Math.round(sec * 10) / 10;
  const secFinal = secR >= 60 ? 0 : secR;
  const minFinal = secR >= 60 ? min + 1 : min;
  return `${deg}° ${String(minFinal).padStart(2,'0')}' ${String(Math.round(secFinal)).padStart(2,'0')}"`;
}

// Global data store for CSV export
let globalData = {};

// Auto-derive Chainage of T1 from Chainage of I (Ch(T1) = Ch(I) - T)
// Runs whenever R, theta, or Ch(I) changes. If Ch(I) is blank, ch_t1 stays
// editable and is left as whatever the user has typed.
function autoCalcT1() {
  const R       = parseFloat(document.getElementById('R').value);
  const theta_d = parseFloat(document.getElementById('theta_d').value) || 0;
  const theta_m = parseFloat(document.getElementById('theta_m').value) || 0;
  const theta_s = parseFloat(document.getElementById('theta_s').value) || 0;
  const theta   = theta_d + theta_m / 60 + theta_s / 3600;
  const ch_I    = document.getElementById('ch_I').value;
  const ch_t1Field = document.getElementById('ch_t1');

  if (ch_I === '' || isNaN(parseFloat(ch_I))) {
    ch_t1Field.readOnly = false;
    ch_t1Field.style.opacity = '';
    return;
  }
  if (isNaN(R) || isNaN(theta) || R <= 0 || theta <= 0 || theta >= 180) {
    return; // not enough info yet to derive T
  }
  const T = R * Math.tan(toRad(theta / 2));
  ch_t1Field.value = (parseFloat(ch_I) - T).toFixed(4);
  ch_t1Field.readOnly = true;
  ch_t1Field.style.opacity = '0.7';
}

// ══════════════════════════════════════════════
// MAIN CALCULATE FUNCTION
// ══════════════════════════════════════════════

function calculate() {
  const R       = parseFloat(document.getElementById('R').value);
  const theta_d = parseFloat(document.getElementById('theta_d').value) || 0;
  const theta_m = parseFloat(document.getElementById('theta_m').value) || 0;
  const theta_s = parseFloat(document.getElementById('theta_s').value) || 0;
  const theta   = theta_d + theta_m / 60 + theta_s / 3600;
  const ch_t1   = parseFloat(document.getElementById('ch_t1').value);
  const ch_I_input = document.getElementById('ch_I').value;
  const ch_I    = ch_I_input === '' ? null : parseFloat(ch_I_input);
  const interval= parseFloat(document.getElementById('interval').value);
  const bearing = parseFloat(document.getElementById('bearing').value);
  const E_t1    = parseFloat(document.getElementById('E_t1').value);
  const N_t1    = parseFloat(document.getElementById('N_t1').value);
  const dir     = document.getElementById('direction').value;

  if (isNaN(R)||isNaN(theta)||isNaN(ch_t1)||isNaN(interval)||R<=0||theta<=0||theta>=180||interval<=0) {
    alert('Please enter valid curve parameters.');
    return;
  }

  // ── PRELIMINARY CALCULATIONS ──
  const thetaRad  = toRad(theta);
  const half      = theta / 2;
  const halfRad   = toRad(half);
  const T         = R * Math.tan(halfRad);
  const L         = R * thetaRad;
  const C         = 2 * R * Math.sin(halfRad);
  const M         = R * (1 - Math.cos(halfRad));
  const E         = R * (1/Math.cos(halfRad) - 1);
  const D         = 5729.578 / R;
  const ch_t2     = ch_t1 + L;
  const ch_I_val  = ch_I !== null ? ch_I : ch_t1 + T;

  // Sub-chord data
  // First peg chainage = next round multiple of interval above ch_t1
  const firstPegCh = Math.ceil((ch_t1 + 0.0001) / interval) * interval;
  const c1 = firstPegCh - ch_t1; // first sub-chord

  // Build chainages array
  const chainages = [];
  let ch = ch_t1;
  chainages.push(ch);
  // add first peg
  if (Math.abs(c1 - interval) > 0.001 && c1 > 0.001) {
    ch = firstPegCh;
    chainages.push(ch);
  }
  // standard pegs
  ch = firstPegCh;
  while (true) {
    ch += interval;
    if (ch >= ch_t2 - 0.001) break;
    chainages.push(parseFloat(ch.toFixed(6)));
  }
  chainages.push(ch_t2);

  // Deflection increment per standard chord
  const delta_std = toDeg(interval / (2 * R)); // degrees

  // PO for long chord method
  const PO = Math.sqrt(R*R - (C/2)*(C/2));

  globalData = { R, theta, ch_t1, ch_I, ch_I_val, interval, bearing, E_t1, N_t1, dir,
    T, L, C, M, E, D, ch_t2, half, chainages, delta_std, PO, c1 };

  const methods = [...document.querySelectorAll('.method-check:checked')].map(c=>parseInt(c.value));

  let html = '';

  // ── PRELIMINARY SECTION ──
  html += `
  <div style="margin-bottom:24px;">
    <div class="panel-title" style="font-family:"Times New Roman",Times,serif;font-size:13px;font-weight:700;color:var(--glow);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px;">
      ▸ Preliminary Calculations
      <span style="flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);display:block;"></span>
    </div>
    <div class="prelim-grid">
      <div class="prelim-card"><div class="pv">${fmt(T,3)} m</div><div class="pl">Tangent Length T</div><div class="pf">R·tan(θ/2)</div></div>
      <div class="prelim-card"><div class="pv">${fmt(L,3)} m</div><div class="pl">Arc Length L</div><div class="pf">R·θ(rad)</div></div>
      <div class="prelim-card"><div class="pv">${fmt(C,3)} m</div><div class="pl">Long Chord C</div><div class="pf">2R·sin(θ/2)</div></div>
      <div class="prelim-card"><div class="pv">${fmt(M,3)} m</div><div class="pl">Mid Offset M</div><div class="pf">R(1−cos θ/2)</div></div>
      <div class="prelim-card"><div class="pv">${fmt(E,3)} m</div><div class="pl">Apex Distance E</div><div class="pf">R(sec θ/2−1)</div></div>
      <div class="prelim-card"><div class="pv">${fmt(D,4)}°</div><div class="pl">Degree of Curve D</div><div class="pf">5729.578/R</div></div>
      <div class="prelim-card"><div class="pv">${fmtDMS(half)}</div><div class="pl">Half Deflection θ/2</div><div class="pf">Check angle</div></div>
      <div class="prelim-card"><div class="pv">${chainages.length - 1}</div><div class="pl">No. of Chords</div><div class="pf">ceil(L/c)</div></div>
      <div class="prelim-card"><div class="pv">${fmtCh(ch_t1)}</div><div class="pl">Chainage T1</div><div class="pf">${ch_I!==null?'Ch(I) − T':'Given'}</div></div>
      <div class="prelim-card"><div class="pv">${fmtCh(ch_t2)}</div><div class="pl">Chainage T2</div><div class="pf">Ch(T1) + L</div></div>
      <div class="prelim-card" style="border-top:2px solid var(--gold);"><div class="pv" style="color:var(--gold);">${fmtCh(ch_I_val)}</div><div class="pl">Chainage of I</div><div class="pf">${ch_I!==null?'Given':'Ch(T1) + T'}</div></div>
    </div>
  </div>`;

  // ── METHOD OUTPUTS ──
  if (methods.includes(1)) html += method1(R, T, ch_t1, interval, chainages, theta, dir, ch_t2);
  if (methods.includes(2)) html += method2(R, C, PO, ch_t1, interval, chainages, theta, dir, ch_t2);
  if (methods.includes(3)) html += method3(R, theta, half, ch_t1, interval, chainages, delta_std, dir, ch_t2, T);
  if (methods.includes(4)) html += method4(R, theta, half, ch_t1, interval, chainages, delta_std, dir, ch_t2, T);
  if (methods.includes(5)) html += method5(R, theta, half, ch_t1, interval, chainages, delta_std, C, dir, ch_t2, T);
  if (methods.includes(6)) html += method6(R, theta, half, ch_t1, interval, chainages, delta_std, bearing, E_t1, N_t1, dir, C, ch_t2, T);

  document.getElementById('output').innerHTML = html;
}

// ══════════════════════════════════════════════
// SVG SETTING-OUT DIAGRAMS
// ══════════════════════════════════════════════

// Compute peg coordinates around the curve (world space, T1 at origin,
// initial tangent pointing in +x). Centre is offset by R perpendicular
// to the tangent, on the side given by `dir` ('right' or 'left').
function pegCoords(R, theta, ch_t1, chainages, dir) {
  const sign = dir === 'left' ? -1 : 1;
  const centre = { x: 0, y: sign * R };
  const ang0 = -sign * Math.PI / 2; // angle from centre to T1
  const pts = chainages.map((ch, i) => {
    const arc = ch - ch_t1;
    const ang = ang0 + sign * (arc / R);
    const x = centre.x + R * Math.cos(ang);
    const y = centre.y + R * Math.sin(ang);
    const label = i === 0 ? 'T1' : i === chainages.length - 1 ? 'T2' : 'P' + i;
    return { x, y, label, ang };
  });
  return { pts, centre, sign };
}

// Build the full diagram: arc, tangents, T1/T2/I markers, pegs, a
// method-specific overlay (drawExtras), and a non-overlapping legend
// panel docked to the right of the drawing area.
function makeSVG(R, theta, ch_t1, ch_t2, chainages, dir, T, legendItems, drawExtras) {
  const W = 700, H = 420;
  const PAD = 38;
  const LEGEND_W = 178;

  const { pts, centre, sign } = pegCoords(R, theta, ch_t1, chainages, dir);
  const T1 = pts[0];
  const T2 = pts[pts.length - 1];
  const I  = { x: T1.x + T, y: T1.y }; // I lies on forward tangent at T1, distance T

  // Mid-arc point (midpoint of the curve, M from T1) — used to draw R clearly
  const ang0all = -sign * Math.PI / 2;
  const midArcAng = ang0all + sign * ((ch_t2 - ch_t1) / 2 / R);
  const midArcPt = { x: centre.x + R * Math.cos(midArcAng), y: centre.y + R * Math.sin(midArcAng) };

  // World bounding box: pegs + I + back-tangent stub.
  // For the centre O: include it in the box but cap how far it can push
  // the bounds — otherwise a large-R flat curve has O kilometres away
  // and the curve itself shrinks to a pixel-thin line.
  const allX = [...pts.map(p => p.x), I.x, T1.x - T * 0.3];
  const allY = [...pts.map(p => p.y), I.y];
  let mnX = Math.min(...allX), mxX = Math.max(...allX);
  let mnY = Math.min(...allY), mxY = Math.max(...allY);
  const mgx = Math.max((mxX - mnX) * 0.12, 5);
  const mgy = Math.max((mxY - mnY) * 0.15, 5);
  // How far does O sit beyond the curve's own bounding box?
  // Cap its influence to at most 60 % of the curve's own span so the
  // diagram stays readable even for large radii.
  const curveSpanX = mxX - mnX, curveSpanY = mxY - mnY;
  const oClampX = Math.max(Math.min(centre.x, mxX + curveSpanX * 0.6), mnX - curveSpanX * 0.6);
  const oClampY = Math.max(Math.min(centre.y, mxY + curveSpanY * 0.6), mnY - curveSpanY * 0.6);
  mnX = Math.min(mnX, oClampX) - mgx;
  mxX = Math.max(mxX, oClampX) + mgx;
  mnY = Math.min(mnY, oClampY) - mgy;
  mxY = Math.max(mxY, oClampY) + mgy;

  const drawW = W - PAD * 2 - LEGEND_W - 14; // reserve right-side legend strip
  const drawH = H - PAD * 2;
  const spanX = mxX - mnX || 1, spanY = mxY - mnY || 1;
  // Uniform scale so the curve isn't distorted
  const scale = Math.min(drawW / spanX, drawH / spanY);
  const offX = PAD + (drawW - spanX * scale) / 2;
  const offY = PAD + (drawH - spanY * scale) / 2;

  function sx(wx) { return offX + (wx - mnX) * scale; }
  function sy(wy) { return offY + (mxY - wy) * scale; }

  // Smooth arc path from T1 to T2
  const N = Math.max(40, chainages.length * 4);
  let arcPts = [];
  const ang0 = -sign * Math.PI / 2;
  const totalArc = ch_t2 - ch_t1;
  for (let k = 0; k <= N; k++) {
    const arc = totalArc * k / N;
    const ang = ang0 + sign * (arc / R);
    arcPts.push([centre.x + R * Math.cos(ang), centre.y + R * Math.sin(ang)]);
  }
  const arcPath = arcPts.map((p, i) => `${i === 0 ? 'M' : 'L'}${sx(p[0]).toFixed(1)},${sy(p[1]).toFixed(1)}`).join(' ');

  // Tangent stubs: short back-tangent before T1, short forward stub past T2
  const rot = sign * toRad(theta);
  const backLen = Math.max(T * 0.3, 8);
  const t1BackX = T1.x - backLen, t1BackY = T1.y;
  const t2ForwX = T2.x + backLen * Math.cos(rot), t2ForwY = T2.y + backLen * Math.sin(rot);

  const extras = drawExtras ? drawExtras(pts, T1, T2, I, centre, sx, sy) : '';

  // Legend panel — docked top-right, fully outside the drawing's bounding box
  const LX = W - LEGEND_W - 6;
  const LY = PAD - 8;
  const rowH = 20;
  let legendSVG = `
    <rect x="${LX}" y="${LY}" width="${LEGEND_W}" height="${legendItems.length * rowH + 16}" rx="6"
          fill="#f5f7fb" stroke="#d9e2ef" stroke-width="1"/>
    <text x="${LX + 9}" y="${LY + 15}" font-family="Times New Roman" font-size="10" font-weight="700"
          fill="#0066bb" letter-spacing="1.5">LEGEND</text>`;
  legendItems.forEach((item, i) => {
    const ly = LY + 26 + i * rowH;
    if (item.dot) {
      legendSVG += `<circle cx="${LX + 17}" cy="${ly}" r="4" fill="${item.dot}" stroke="#fff" stroke-width="1"/>`;
    } else {
      legendSVG += `<line x1="${LX + 9}" y1="${ly}" x2="${LX + 27}" y2="${ly}"
                          stroke="${item.color}" stroke-width="${item.width || 2}"
                          stroke-dasharray="${item.dash || ''}"/>`;
    }
    legendSVG += `<text x="${LX + 32}" y="${ly + 3.5}" font-family="Times New Roman" font-size="9.5" fill="#1b2a41">${item.label}</text>`;
  });

  // Peg markers + labels (radial label offset so text clears the curve/centre)
  // When there are many pegs, every dot is still drawn but only every Nth
  // label is printed so text doesn't pile up on top of itself.
  const labelStep = pts.length > 16 ? Math.ceil((pts.length - 2) / 12) : 1;
  const pegSVG = pts.map((p, i) => {
    const isEnd = i === 0 || i === pts.length - 1;
    const showLabel = isEnd || (i % labelStep === 0);
    const col = isEnd ? '#8a6200' : '#0066bb';
    const r = isEnd ? 5 : 3.3;
    const nx = Math.cos(p.ang), ny = Math.sin(p.ang);
    const loff = isEnd ? 15 : 11;
    const lx = sx(p.x) + nx * loff;
    const ly = sy(p.y) - ny * loff;
    const labelSVG = showLabel ? `<text x="${lx.toFixed(1)}" y="${(ly + 3).toFixed(1)}" font-family="Times New Roman"
                  font-size="${isEnd ? 10.5 : 8}" font-weight="${isEnd ? 700 : 400}"
                  fill="${col}" text-anchor="middle">${p.label}</text>` : '';
    return `<circle cx="${sx(p.x).toFixed(1)}" cy="${sy(p.y).toFixed(1)}" r="${r}" fill="${col}" stroke="#fff" stroke-width="1.2"/>
            ${labelSVG}`;
  }).join('\n');

  // Show this only when labels were thinned out, so it's clear pegs exist beyond what's labelled
  const labelNote = labelStep > 1
    ? `<text x="${W - LEGEND_W - 6}" y="${H - 10}" font-family="Times New Roman" font-size="8.5"
             fill="#8a96a8" text-anchor="end">Every ${labelStep===1?'':labelStep+(labelStep===2?'nd':labelStep===3?'rd':'th')+' '}peg labelled — see table for all chainages</text>`
    : '';

  return `
  <div style="margin-top:18px;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;">
    <div style="padding:9px 14px 5px;font-family:'Times New Roman',Times,serif;font-size:11px;font-weight:700;
                color:#0066bb;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);">
      ▸ Setting Out Diagram
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;max-height:420px;" xmlns="http://www.w3.org/2000/svg">
      <rect width="${W}" height="${H}" fill="#ffffff"/>

      <!-- Tangents -->
      <line x1="${sx(t1BackX).toFixed(1)}" y1="${sy(t1BackY).toFixed(1)}" x2="${sx(T1.x).toFixed(1)}" y2="${sy(T1.y).toFixed(1)}"
            stroke="#6b7c93" stroke-width="1.2" stroke-dasharray="5,3"/>
      <line x1="${sx(T1.x).toFixed(1)}" y1="${sy(T1.y).toFixed(1)}" x2="${sx(I.x).toFixed(1)}" y2="${sy(I.y).toFixed(1)}"
            stroke="#6b7c93" stroke-width="1.5"/>
      <line x1="${sx(I.x).toFixed(1)}" y1="${sy(I.y).toFixed(1)}" x2="${sx(T2.x).toFixed(1)}" y2="${sy(T2.y).toFixed(1)}"
            stroke="#6b7c93" stroke-width="1.5"/>
      <line x1="${sx(T2.x).toFixed(1)}" y1="${sy(T2.y).toFixed(1)}" x2="${sx(t2ForwX).toFixed(1)}" y2="${sy(t2ForwY).toFixed(1)}"
            stroke="#6b7c93" stroke-width="1.2" stroke-dasharray="5,3"/>

      <!-- Curve arc -->
      <path d="${arcPath}" fill="none" stroke="#cc2233" stroke-width="2.5"/>

      <!-- Radii O→T1 and O→T2: lines originate from real centre O, clipped
           to the drawing area so they always touch T1 and T2 exactly, and
           the O end is either shown fully (small R) or clipped (large R).   -->
      ${(() => {
        const oSx = sx(centre.x), oSy = sy(centre.y);
        const t1Sx = sx(T1.x), t1Sy = sy(T1.y);
        const t2Sx = sx(T2.x), t2Sy = sy(T2.y);
        const mSx  = sx(midArcPt.x), mSy = sy(midArcPt.y);
        const clipId = `rclip_${Math.random().toString(36).slice(2,7)}`;
        const inView = oSx >= 0 && oSx <= W && oSy >= 0 && oSy <= H;

        // R label: sit near midpoint of O→T1 line, nudged outward so it
        // clears the line itself; fall back to near mid-arc when O is off-screen.
        const refSx = inView ? oSx : mSx;
        const refSy = inView ? oSy : mSy;
        const rMidX = (refSx + t1Sx) / 2;
        const rMidY = (refSy + t1Sy) / 2;
        // Perpendicular nudge
        const dx1 = t1Sx - refSx, dy1 = t1Sy - refSy;
        const len1 = Math.sqrt(dx1*dx1+dy1*dy1) || 1;
        const perpX = -dy1/len1 * 12, perpY = dx1/len1 * 12;
        const rLx = (rMidX + perpX).toFixed(1);
        const rLy = (rMidY + perpY + 4).toFixed(1);

        const oMarker = inView
          ? `<circle cx="${oSx.toFixed(1)}" cy="${oSy.toFixed(1)}" r="4" fill="#cc7a00" stroke="#fff" stroke-width="1.2"/>
             <text x="${oSx.toFixed(1)}" y="${(oSy - 9).toFixed(1)}" font-family="Times New Roman"
                   font-size="10.5" font-weight="700" fill="#cc7a00" text-anchor="middle">O</text>`
          : `<text x="${(W - LEGEND_W - 10).toFixed(1)}" y="${(H - 22).toFixed(1)}"
                   font-family="Times New Roman" font-size="8" fill="#cc7a00"
                   text-anchor="end" font-style="italic">Centre O outside view — R = ${fmt(R,2)} m</text>`;

        return `
          <defs>
            <clipPath id="${clipId}">
              <rect x="0" y="0" width="${W}" height="${H}"/>
            </clipPath>
          </defs>
          <g clip-path="url(#${clipId})">
            <line x1="${oSx.toFixed(1)}" y1="${oSy.toFixed(1)}" x2="${t1Sx.toFixed(1)}" y2="${t1Sy.toFixed(1)}"
                  stroke="#cc7a00" stroke-width="1.3" stroke-dasharray="7,4" opacity="0.9"/>
            <line x1="${oSx.toFixed(1)}" y1="${oSy.toFixed(1)}" x2="${t2Sx.toFixed(1)}" y2="${t2Sy.toFixed(1)}"
                  stroke="#cc7a00" stroke-width="1.3" stroke-dasharray="7,4" opacity="0.9"/>
          </g>
          ${oMarker}
          <text x="${rLx}" y="${rLy}" font-family="Times New Roman" font-size="10"
                font-weight="700" fill="#cc7a00" text-anchor="middle">R = ${fmt(R,2)} m</text>`;
      })()}

      <!-- Method-specific construction lines -->
      ${extras}

      <!-- Pegs -->
      ${pegSVG}

      <!-- Intersection point I -->
      <polygon points="${sx(I.x).toFixed(1)},${(sy(I.y)-7).toFixed(1)} ${(sx(I.x)-5).toFixed(1)},${(sy(I.y)+4).toFixed(1)} ${(sx(I.x)+5).toFixed(1)},${(sy(I.y)+4).toFixed(1)}"
               fill="#7a3db8" stroke="#fff" stroke-width="1"/>
      <text x="${(sx(I.x)+9).toFixed(1)}" y="${(sy(I.y)-4).toFixed(1)}" font-family="Times New Roman"
            font-size="10.5" font-weight="700" fill="#7a3db8">I</text>

      <!-- Legend -->
      ${legendSVG}

      <!-- Note about thinned labels, if applicable -->
      ${labelNote}
    </svg>
  </div>`;
}

// ── Diagram 1: Offsets from the Tangent ──
function diagram1(R, T, ch_t1, ch_t2, chainages, dir, theta) {
  function extras(pts, T1, T2, I, centre, sx, sy) {
    let s = '';
    const step = pts.length > 16 ? Math.ceil((pts.length - 2) / 14) : 1;
    pts.forEach((p, i) => {
      if (i === 0 || i === pts.length - 1) return;
      if (i % step !== 0) return;
      const arc = p.x - T1.x; // since tangent at T1 runs along +x
      if (arc > T + 0.01) return;
      const foot = { x: p.x, y: T1.y };
      s += `<line x1="${sx(T1.x).toFixed(1)}" y1="${sy(T1.y).toFixed(1)}" x2="${sx(foot.x).toFixed(1)}" y2="${sy(foot.y).toFixed(1)}"
                  stroke="#6b7c93" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.4"/>`;
      s += `<line x1="${sx(foot.x).toFixed(1)}" y1="${sy(foot.y).toFixed(1)}" x2="${sx(p.x).toFixed(1)}" y2="${sy(p.y).toFixed(1)}"
                  stroke="#006b3c" stroke-width="1.1" stroke-dasharray="4,2"/>`;
    });
    return s;
  }
  const legend = [
    { color: '#6b7c93', width: 1.5, label: 'Tangent lines' },
    { color: '#cc2233', width: 2.5, label: 'Curve arc' },
    { color: '#cc7a00', width: 1.2, dash: '7,4', label: 'Radius R (O→T1, O→T2)' },
    { color: '#006b3c', width: 1.1, dash: '4,2', label: 'Offset y ⟂ tangent' },
    { dot: '#8a6200', label: 'T1 / T2' },
    { dot: '#0066bb', label: 'Intermediate peg' },
    { dot: '#7a3db8', label: 'Intersection I' },
  ];
  return makeSVG(R, theta, ch_t1, ch_t2, chainages, dir, T, legend, extras);
}

// ── Diagram 2: Offsets from the Long Chord ──
function diagram2(R, T, ch_t1, ch_t2, chainages, dir, theta) {
  function extras(pts, T1, T2, I, centre, sx, sy) {
    let s = `<line x1="${sx(T1.x).toFixed(1)}" y1="${sy(T1.y).toFixed(1)}" x2="${sx(T2.x).toFixed(1)}" y2="${sy(T2.y).toFixed(1)}"
                   stroke="#7a3db8" stroke-width="1.4" stroke-dasharray="6,3"/>`;
    const cdx = T2.x - T1.x, cdy = T2.y - T1.y;
    const clen = Math.sqrt(cdx * cdx + cdy * cdy) || 1;
    const ux = cdx / clen, uy = cdy / clen;
    const step = pts.length > 16 ? Math.ceil((pts.length - 2) / 14) : 1;
    pts.forEach((p, i) => {
      if (i === 0 || i === pts.length - 1) return;
      if (i % step !== 0) return;
      const dp = { x: p.x - T1.x, y: p.y - T1.y };
      const proj = dp.x * ux + dp.y * uy;
      const foot = { x: T1.x + proj * ux, y: T1.y + proj * uy };
      s += `<line x1="${sx(foot.x).toFixed(1)}" y1="${sy(foot.y).toFixed(1)}" x2="${sx(p.x).toFixed(1)}" y2="${sy(p.y).toFixed(1)}"
                  stroke="#006b3c" stroke-width="1.1" stroke-dasharray="4,2"/>`;
    });
    return s;
  }
  const legend = [
    { color: '#6b7c93', width: 1.5, label: 'Tangent lines' },
    { color: '#cc2233', width: 2.5, label: 'Curve arc' },
    { color: '#cc7a00', width: 1.2, dash: '7,4', label: 'Radius R (O→T1, O→T2)' },
    { color: '#7a3db8', width: 1.4, dash: '6,3', label: 'Long chord T1→T2' },
    { color: '#006b3c', width: 1.1, dash: '4,2', label: 'Offset yᵢ ⟂ chord' },
    { dot: '#8a6200', label: 'T1 / T2' },
    { dot: '#0066bb', label: 'Intermediate peg' },
  ];
  return makeSVG(R, theta, ch_t1, ch_t2, chainages, dir, T, legend, extras);
}

// ── Diagram 3: Tangential Angles — Two Theodolites (sight rays from T1 & T2) ──
function diagram3(R, T, ch_t1, ch_t2, chainages, dir, theta) {
  function extras(pts, T1, T2, I, centre, sx, sy) {
    let s = '';
    const step = pts.length > 16 ? Math.ceil((pts.length - 2) / 12) : 1;
    pts.forEach((p, i) => {
      if (i === 0 || i === pts.length - 1) return;
      if (i % step !== 0) return;
      s += `<line x1="${sx(T1.x).toFixed(1)}" y1="${sy(T1.y).toFixed(1)}" x2="${sx(p.x).toFixed(1)}" y2="${sy(p.y).toFixed(1)}"
                  stroke="#0066bb" stroke-width="0.9" stroke-dasharray="5,3" opacity="0.7"/>`;
      s += `<line x1="${sx(T2.x).toFixed(1)}" y1="${sy(T2.y).toFixed(1)}" x2="${sx(p.x).toFixed(1)}" y2="${sy(p.y).toFixed(1)}"
                  stroke="#8a6200" stroke-width="0.9" stroke-dasharray="3,3" opacity="0.7"/>`;
    });
    return s;
  }
  const legend = [
    { color: '#6b7c93', width: 1.5, label: 'Tangent lines' },
    { color: '#cc2233', width: 2.5, label: 'Curve arc' },
    { color: '#cc7a00', width: 1.2, dash: '7,4', label: 'Radius R (O→T1, O→T2)' },
    { color: '#0066bb', width: 0.9, dash: '5,3', label: 'Sight from T1 (αᵢ)' },
    { color: '#8a6200', width: 0.9, dash: '3,3', label: 'Sight from T2 (θ/2−αᵢ)' },
    { dot: '#8a6200', label: 'T1 / T2' },
    { dot: '#0066bb', label: 'Peg (ray intersection)' },
  ];
  return makeSVG(R, theta, ch_t1, ch_t2, chainages, dir, T, legend, extras);
}

// ── Diagram 4: Rankine's — sub-chords peg-to-peg + deflection rays from T1 ──
function diagram4(R, T, ch_t1, ch_t2, chainages, dir, theta) {
  function extras(pts, T1, T2, I, centre, sx, sy) {
    let s = '';
    for (let i = 0; i < pts.length - 1; i++) {
      const a = pts[i], b = pts[i + 1];
      s += `<line x1="${sx(a.x).toFixed(1)}" y1="${sy(a.y).toFixed(1)}" x2="${sx(b.x).toFixed(1)}" y2="${sy(b.y).toFixed(1)}"
                  stroke="#006b3c" stroke-width="1.6"/>`;
    }
    pts.forEach((p, i) => {
      if (i === 0) return;
      const isEnd = i === pts.length - 1;
      const step = pts.length > 16 ? Math.ceil((pts.length - 2) / 12) : 1;
      if (!isEnd && i % step !== 0) return;
      s += `<line x1="${sx(T1.x).toFixed(1)}" y1="${sy(T1.y).toFixed(1)}" x2="${sx(p.x).toFixed(1)}" y2="${sy(p.y).toFixed(1)}"
                  stroke="#0066bb" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>`;
    });
    return s;
  }
  const legend = [
    { color: '#6b7c93', width: 1.5, label: 'Tangent lines' },
    { color: '#cc2233', width: 2.5, label: 'Curve arc' },
    { color: '#cc7a00', width: 1.2, dash: '7,4', label: 'Radius R (O→T1, O→T2)' },
    { color: '#006b3c', width: 1.6, label: 'Sub-chord (peg→peg)' },
    { color: '#0066bb', width: 0.8, dash: '4,3', label: 'Deflection ray from T1' },
    { dot: '#8a6200', label: 'T1 / T2' },
    { dot: '#0066bb', label: 'Intermediate peg' },
  ];
  return makeSVG(R, theta, ch_t1, ch_t2, chainages, dir, T, legend, extras);
}

// ══════════════════════════════════════════════
// METHOD 1 — OFFSETS FROM TANGENT
// ══════════════════════════════════════════════
function method1(R, T, ch_t1, interval, chainages, theta, dir, ch_t2) {
  let rows = '';
  const data = [];
  chainages.forEach((ch, i) => {
    const arc = ch - ch_t1;
    if (arc > T + 0.01) return;
    const x = arc;
    const inner = R*R - x*x;
    const y = inner >= 0 ? R - Math.sqrt(inner) : null;
    const isEnd = (i === 0 || i === chainages.length-1);
    data.push({ peg: i===0?'T1': i===chainages.length-1?'T2':`P${i}`, ch: fmt(ch,3), x: fmt(x,3), y: y!==null?fmt(y,4):'>' });
    rows += `<tr class="${isEnd?'td-t1t2':''}">
      <td class="${isEnd?'td-gold':''}">${i===0?'T1':i===chainages.length-1?'T2':'P'+i}</td>
      <td>${fmtCh(ch)}</td>
      <td class="td-hi">${fmt(x,3)}</td>
      <td>${inner>=0?fmt(R*R - x*x,3):'N/A'}</td>
      <td>${inner>=0?fmt(Math.sqrt(R*R - x*x),4):'N/A'}</td>
      <td class="td-green">${y!==null?fmt(y,4):'> T'}</td>
    </tr>`;
  });
  return `
  <div class="output-section">
    <div class="section-header">
      <div class="section-num">1</div>
      <div><div class="section-title">OFFSETS FROM THE TANGENT</div>
      <div class="section-sub">y = R − √(R² − x²) &nbsp;|&nbsp; Tape only — no theodolite required</div></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Peg</th><th>Chainage (m)</th><th>x along Tangent (m)</th><th>R²−x²</th><th>√(R²−x²)</th><th>y = Offset (m)</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="note-box">⚑ Valid only while x ≤ T = ${fmt(globalData.T,3)} m. Offsets become impractical beyond tangent length. Set offset perpendicular to tangent at each x.</div>
    <div class="check-badge">✓ Check: y = 0 at x = 0 (T1) &nbsp;|&nbsp; Instrument: Steel tape only</div>
    ${diagram1(R, T, ch_t1, ch_t2, chainages, dir, theta)}
  </div>`;
}

// ══════════════════════════════════════════════
// METHOD 2 — OFFSETS FROM LONG CHORD
// ══════════════════════════════════════════════
function method2(R, C, PO, ch_t1, interval, chainages, theta, dir, ch_t2) {
  const halfC = C / 2;
  let rows = '';
  chainages.forEach((ch, i) => {
    const arc = ch - ch_t1;
    const xi = arc - halfC; // distance from centre of chord
    const inner = R*R - xi*xi;
    const yi = inner >= 0 ? Math.sqrt(inner) - PO : null;
    const isEnd = (i === 0 || i === chainages.length-1);
    rows += `<tr class="${isEnd?'td-t1t2':''}">
      <td class="${isEnd?'td-gold':''}">${i===0?'T1':i===chainages.length-1?'T2':'P'+i}</td>
      <td>${fmtCh(ch)}</td>
      <td class="td-hi">${fmt(xi,3)}</td>
      <td>${inner>=0?fmt(inner,3):'N/A'}</td>
      <td>${inner>=0?fmt(Math.sqrt(inner),4):'N/A'}</td>
      <td class="td-green">${yi!==null?fmt(yi,4):'N/A'}</td>
    </tr>`;
  });
  return `
  <div class="output-section">
    <div class="section-header">
      <div class="section-num">2</div>
      <div><div class="section-title">OFFSETS FROM THE LONG CHORD</div>
      <div class="section-sub">yᵢ = √(R²−xᵢ²) − PO &nbsp;|&nbsp; PO = ${fmt(PO,4)} m &nbsp;|&nbsp; C/2 = ${fmt(halfC,3)} m</div></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Peg</th><th>Chainage (m)</th><th>xᵢ from Chord Centre (m)</th><th>R²−xᵢ²</th><th>√(R²−xᵢ²)</th><th>yᵢ = Offset (m)</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="note-box">⚑ PO = √(R² − (C/2)²) = ${fmt(PO,4)} m &nbsp;|&nbsp; xᵢ measured from midpoint of long chord T1→T2. yᵢ must = 0 at T1 and T2.</div>
    <div class="check-badge">✓ Check: yᵢ ≈ 0 at T1 and T2 &nbsp;|&nbsp; Instrument: Steel tape only</div>
    ${diagram2(R, R * Math.tan(toRad(theta / 2)), ch_t1, ch_t2, chainages, dir, theta)}
  </div>`;
}

// ══════════════════════════════════════════════
// METHOD 3 — TANGENTIAL ANGLES (TWO THEODOLITES)
// ══════════════════════════════════════════════
function method3(R, theta, half, ch_t1, interval, chainages, delta_std, dir, ch_t2, T) {
  let rows = '';
  let cumDeg = 0;
  chainages.forEach((ch, i) => {
    const arc = ch - ch_t1;
    const chord = i === 0 ? 0 : arc - (chainages[i-1] - ch_t1);
    const dInc = i === 0 ? 0 : toDeg(chord / (2*R));
    if (i > 0) cumDeg += dInc;
    const fromT2 = half - cumDeg;
    const isEnd = (i === 0 || i === chainages.length-1);
    rows += `<tr class="${isEnd?'td-t1t2':''}">
      <td class="${isEnd?'td-gold':''}">${i===0?'T1':i===chainages.length-1?'T2':'P'+i}</td>
      <td>${fmtCh(ch)}</td>
      <td>${i===0?'—':fmt(chord,3)}</td>
      <td>${i===0?'—':fmtDMS(dInc)}</td>
      <td class="td-hi">${fmtDMS(cumDeg)}</td>
      <td class="td-gold">${fmtDMS(fromT2 < 0 ? 0 : fromT2)}</td>
    </tr>`;
  });
  return `
  <div class="output-section">
    <div class="section-header">
      <div class="section-num">3</div>
      <div><div class="section-title">TANGENTIAL / DEFLECTION ANGLES — TWO THEODOLITES</div>
      <div class="section-sub">Theodolite at T1 sets αᵢ; Theodolite at T2 sets (θ/2 − αᵢ). No taping needed.</div></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Peg</th><th>Chainage (m)</th><th>Chord (m)</th><th>δᵢ Increment</th><th>Δᵢ from T1 (αᵢ)</th><th>θ/2−αᵢ from T2</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="note-box">⚑ T1 theodolite: Sight I → set zero → turn off Δᵢ. T2 theodolite: Sight T1 → set θ/2 → turn off (θ/2−Δᵢ). Intersection fixes each peg.</div>
    <div class="check-badge">✓ Check: Δ at T2 = θ/2 = ${fmtDMS(half)} &nbsp;|&nbsp; From T2 angle = 0° at T2</div>
    ${diagram3(R, T, ch_t1, ch_t2, chainages, dir, theta)}
  </div>`;
}

// ══════════════════════════════════════════════
// METHOD 6 — COORDINATES
// ══════════════════════════════════════════════
function method6(R, theta, half, ch_t1, interval, chainages, delta_std, bearing, E_t1, N_t1, dir, C, ch_t2, T) {
  let rows = '';
  let cumDeg = 0;
  const sign = dir === 'right' ? 1 : -1;
  chainages.forEach((ch, i) => {
    const arc = ch - ch_t1;
    const chord = i === 0 ? 0 : arc - (chainages[i-1] - ch_t1);
    const dInc = i === 0 ? 0 : toDeg(chord / (2*R));
    if (i > 0) cumDeg += dInc;
    const Di = 2 * R * Math.sin(toRad(cumDeg));
    const brg = bearing + sign * cumDeg;
    const E = E_t1 + Di * Math.sin(toRad(brg));
    const N = N_t1 + Di * Math.cos(toRad(brg));
    const isEnd = (i === 0 || i === chainages.length-1);
    const isLast = i === chainages.length-1;
    rows += `<tr class="${isEnd?'td-t1t2':''}">
      <td class="${isEnd?'td-gold':''}">${i===0?'T1':isLast?'T2':'P'+i}</td>
      <td>${fmtCh(ch)}</td>
      <td class="td-hi">${fmtDMS(cumDeg)}</td>
      <td>${fmt(Di,4)}</td>
      <td class="td-gold">${fmt(E,4)}</td>
      <td class="td-green">${fmt(N,4)}</td>
      <td>${fmt(brg % 360, 4)}°</td>
    </tr>`;
  });
  return `
  <div class="output-section">
    <div class="section-header">
      <div class="section-num">6</div>
      <div><div class="section-title">COORDINATES (E, N) — GNSS / TOTAL STATION</div>
      <div class="section-sub">T1=(${fmt(E_t1,2)}, ${fmt(N_t1,2)}) &nbsp;|&nbsp; Bearing T1→I = ${bearing}° &nbsp;|&nbsp; Direction: ${dir.toUpperCase()}</div></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Peg</th><th>Chainage (m)</th><th>Δᵢ</th><th>Dᵢ (m)</th><th>Easting (m)</th><th>Northing (m)</th><th>Bearing (°)</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="note-box">⚑ Upload E,N coordinate list to GNSS/Total Station controller. Navigate rover to each point. For control-based setting out: compute bearing & distance from control stations to each curve peg using polars or intersection.</div>
    <div class="check-badge">✓ Check: D(T2) = ${fmt(C,3)} m (Long Chord) &nbsp;|&nbsp; Instrument: RTK GNSS or Total Station + control network</div>
    ${diagram6(R, T, ch_t1, ch_t2, chainages, dir, theta)}
  </div>`;
}

    let cumDeg3 = 0;
    chainages.forEach((ch, i) => {
      const arc = ch - ch_t1;
      const chord = i===0?0:arc-(chainages[i-1]-ch_t1);
      const dInc = i===0?0:toDeg(chord/(2*R));
      if (i>0) cumDeg3 += dInc;
      const fromT2 = half - cumDeg3;
      const peg = i===0?'T1':i===chainages.length-1?'T2':'P'+i;
      csv += `${peg},${fmtCh(ch)},${i===0?'—':fmt(chord,3)},${i===0?'—':fmtDMS(dInc)},${fmtDMS(cumDeg3)},${fmtDMS(fromT2<0?0:fromT2)}\n`;
    });
    csv += `\n`;
  }

  // METHOD 4 — RANKINE'S DEFLECTION ANGLES
  if (methods.includes(4)) {
    csv += `METHOD 4 - RANKINE'S DEFLECTION ANGLES\n`;
    csv += `Peg,Chainage,Sub-Chord (m),delta Increment,Delta Cumulative\n`;
    let cumDeg4 = 0;
    chainages.forEach((ch, i) => {
      const arc = ch - ch_t1;
      const chord = i===0?0:arc-(chainages[i-1]-ch_t1);
      const dInc = i===0?0:toDeg(chord/(2*R));
      if (i>0) cumDeg4 += dInc;
      const peg = i===0?'T1':i===chainages.length-1?'T2':'P'+i;
      csv += `${peg},${fmtCh(ch)},${i===0?'—':fmt(chord,4)},${i===0?'—':fmtDMS(dInc)},${fmtDMS(cumDeg4)}\n`;
    });
    csv += `\n`;
  }

  // METHOD 5 — EDM CHORDS FROM T1
  if (methods.includes(5)) {
    csv += `METHOD 5 - EDM CHORDS FROM T1\n`;
    csv += `Peg,Chainage,Delta Cumulative,Di=2R.sin(Delta) (m),Sub-Chord (m),delta Increment\n`;
    let cumDeg5 = 0;
    chainages.forEach((ch, i) => {
      const arc = ch - ch_t1;
      const chord = i===0?0:arc-(chainages[i-1]-ch_t1);
      const dInc = i===0?0:toDeg(chord/(2*R));
      if (i>0) cumDeg5 += dInc;
      const Di = 2*R*Math.sin(toRad(cumDeg5));
      const peg = i===0?'T1':i===chainages.length-1?'T2':'P'+i;
      csv += `${peg},${fmtCh(ch)},${fmtDMS(cumDeg5)},${fmt(Di,4)},${i===0?'—':fmt(chord,3)},${i===0?'—':fmtDMS(dInc)}\n`;
    });
    csv += `\n`;
  }

  // METHOD 6 — COORDINATES
  if (methods.includes(6)) {
    csv += `METHOD 6 - COORDINATES (E, N)\n`;
    csv += `Peg,Chainage,Delta Cumulative,Di (m),Easting (m),Northing (m),Bearing (deg)\n`;
    let cumDeg6 = 0;
    chainages.forEach((ch, i) => {
      const arc = ch - ch_t1;
      const chord = i===0?0:arc-(chainages[i-1]-ch_t1);
      const dInc = i===0?0:toDeg(chord/(2*R));
      if (i>0) cumDeg6 += dInc;
      const Di = 2*R*Math.sin(toRad(cumDeg6));
      const brg = bearing + sign * cumDeg6;
      const Ec = E_t1 + Di*Math.sin(toRad(brg));
      const Nc = N_t1 + Di*Math.cos(toRad(brg));
      const peg = i===0?'T1':i===chainages.length-1?'T2':'P'+i;
      csv += `${peg},${fmtCh(ch)},${fmtDMS(cumDeg6)},${fmt(Di,4)},${fmt(Ec,4)},${fmt(Nc,4)},${fmt(brg%360,4)}\n`;
    });
    csv += `\n`;
  }

  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `curve_R${R}_theta${theta}_setting_out.csv`;
  a.click();
}

function resetAll() {
  document.getElementById('R').value = '';
  document.getElementById('theta_d').value = '';
  document.getElementById('theta_m').value = '';
  document.getElementById('theta_s').value = '';
  document.getElementById('ch_I').value = '';
  document.getElementById('ch_t1').value = '';
  document.getElementById('ch_t1').readOnly = false;
  document.getElementById('ch_t1').style.opacity = '';
  document.getElementById('interval').value = '';
  document.getElementById('bearing').value = '0';
  document.getElementById('E_t1').value = '';
  document.getElementById('N_t1').value = '';
  document.getElementById('output').innerHTML = `
    <div class="empty-state">
      <div class="icon">📐</div>
      <p>Enter curve parameters and click COMPUTE ALL to generate setting out tables</p>
    </div>`;
  globalData = {};
}

// Auto-run on load with defaults
window.onload = () => calculate();
</script>
<script type="module">
  import { auth, db, mountAppBar } from "./firebase-init.js";
  import {
    collection, addDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // Adds the shared nav bar and redirects to index.html if not signed in.
  mountAppBar("calculator");

  document.getElementById("saveToDashboardBtn").addEventListener("click", async () => {
    const user = auth.currentUser;
    if (!user) { alert("Please log in first."); return; }
    const outputEl = document.getElementById("output");
    if (!outputEl || !outputEl.innerHTML.trim()) {
      alert("Compute a curve first, then save it.");
      return;
    }
    const btn = document.getElementById("saveToDashboardBtn");
    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = "Saving…";
    try {
      await addDoc(collection(db, "users", user.uid, "calculations"), {
        title: `R=${document.getElementById('R').value} m, θ=${document.getElementById('theta_d').value}° @ Ch ${document.getElementById('ch_t1').value}`,
        inputs: {
          R: document.getElementById('R').value,
          theta_d: document.getElementById('theta_d').value,
          theta_m: document.getElementById('theta_m').value,
          theta_s: document.getElementById('theta_s').value,
          ch_t1: document.getElementById('ch_t1').value,
          ch_I: document.getElementById('ch_I').value,
          interval: document.getElementById('interval').value,
          bearing: document.getElementById('bearing').value,
          E_t1: document.getElementById('E_t1').value,
          N_t1: document.getElementById('N_t1').value,
          direction: document.getElementById('direction').value
        },
        outputHTML: outputEl.innerHTML,
        createdAt: serverTimestamp()
      });
      btn.textContent = "Saved ✓";
      setTimeout(() => { btn.textContent = originalText; btn.disabled = false; }, 1500);
    } catch (err) {
      alert("Could not save: " + err.message);
      btn.textContent = originalText;
      btn.disabled = false;
    }
  });
</script>
