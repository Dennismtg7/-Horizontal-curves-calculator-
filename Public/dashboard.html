<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · MTG7 Curve Calculator</title>
<link rel="stylesheet" href="mtg7-appbar.css">
<style>
:root {
  --bg: #f4f7fc;
  --card: #ffffff;
  --border: #c5d5ea;
  --glow: #0066bb;
  --text: #1b2a41;
  --muted: #5a7090;
  --white: #0f1f35;
  --red: #cc2233;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: "Times New Roman", Times, serif; }
.wrapper { max-width: 1100px; margin: 0 auto; padding: 28px 16px; }
.page-title { font-size: 22px; color: var(--white); letter-spacing: 1px; margin-bottom: 4px; }
.page-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

.yt-banner {
  display: flex;
  align-items: center;
  gap: 14px;
  background: #fff;
  border: 1px solid var(--border);
  border-left: 3px solid var(--red);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 24px;
}
.yt-banner a { color: var(--red); text-decoration: none; font-weight: 700; font-size: 13px; }
.yt-banner p { color: var(--muted); font-size: 13px; }

#empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  display: none;
}
#empty-state a {
  color: var(--glow);
  text-decoration: none;
  font-weight: 700;
}

.calc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.calc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: 3px solid var(--glow);
  border-radius: 10px;
  padding: 18px;
}
.calc-card h3 { font-size: 14px; color: var(--white); margin-bottom: 6px; line-height: 1.4; }
.calc-card .meta { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
.card-actions { display: flex; gap: 8px; }
.card-actions button {
  flex: 1;
  font-family: inherit;
  font-size: 12px;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
}
.card-actions .view-btn:hover { border-color: var(--glow); color: var(--glow); }
.card-actions .delete-btn { color: var(--red); }
.card-actions .delete-btn:hover { background: var(--red); color: #fff; }

/* Simple modal for viewing a saved result */
#viewModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,31,53,0.55);
  z-index: 200;
  padding: 24px;
  overflow-y: auto;
}
#viewModal .modal-inner {
  max-width: 1000px;
  margin: 0 auto;
  background: #fff;
  border-radius: 10px;
  padding: 24px;
}
#viewModal .modal-close {
  float: right;
  border: none;
  background: transparent;
  font-size: 20px;
  cursor: pointer;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="wrapper">
  <h1 class="page-title">Your saved calculations</h1>
  <p class="page-sub">Everything you save from the calculator lands here, tied to your account.</p>

  <div class="yt-banner">
    <p>New to setting-out methods? Walkthroughs for each method are on the MTG7 channel.</p>
    <a href="https://www.youtube.com/@DnsMTG7-uc7nf" target="_blank" rel="noopener">▶ Visit @DnsMTG7-uc7nf</a>
  </div>

  <div id="empty-state">
    <p>No saved calculations yet.</p>
    <p><a href="calculator.html">Run a calculation</a> and click "Save to Dashboard" to see it here.</p>
  </div>

  <div class="calc-grid" id="calcGrid"></div>
</div>

<div id="viewModal">
  <div class="modal-inner">
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script type="module">
  import { auth, db, mountAppBar } from "./firebase-init.js";
  import {
    collection, query, orderBy, onSnapshot, doc, deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  mountAppBar("dashboard");

  const grid = document.getElementById("calcGrid");
  const emptyState = document.getElementById("empty-state");

  auth.onAuthStateChanged((user) => {
    if (!user) return; // mountAppBar already redirects
    const q = query(collection(db, "users", user.uid, "calculations"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
      grid.innerHTML = "";
      if (snap.empty) {
        emptyState.style.display = "block";
        return;
      }
      emptyState.style.display = "none";
      snap.forEach((docSnap) => {
        const data = docSnap.data();
        const card = document.createElement("div");
        card.className = "calc-card";
        const when = data.createdAt?.toDate ? data.createdAt.toDate().toLocaleString() : "Just now";
        card.innerHTML = `
          <h3>${escapeHTML(data.title || "Untitled curve")}</h3>
          <div class="meta">Saved ${when}</div>
          <div class="card-actions">
            <button class="view-btn" data-id="${docSnap.id}">View</button>
            <button class="delete-btn" data-id="${docSnap.id}">Delete</button>
          </div>`;
        grid.appendChild(card);

        card.querySelector(".view-btn").addEventListener("click", () => openModal(data));
        card.querySelector(".delete-btn").addEventListener("click", async () => {
          if (confirm("Delete this saved calculation? This can't be undone.")) {
            await deleteDoc(doc(db, "users", user.uid, "calculations", docSnap.id));
          }
        });
      });
    });
  });

  function openModal(data) {
    document.getElementById("modalContent").innerHTML = data.outputHTML || "<p>No output stored.</p>";
    document.getElementById("viewModal").style.display = "block";
  }
  document.getElementById("modalCloseBtn").addEventListener("click", () => {
    document.getElementById("viewModal").style.display = "none";
  });

  function escapeHTML(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
