<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horizontal Curve Calculator — SurveyPro</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: #0a0f1e; min-height: 100vh; }
    .tool-header {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 24px; background: #0b1f3a;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .back-btn {
      background: rgba(255,255,255,.1); color: #fff; border: none;
      padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
      text-decoration: none; display: inline-block;
    }
    .back-btn:hover { background: rgba(255,255,255,.18); }
    .tool-title { color: #00bfb3; font-size: 15px; font-weight: 700; }
    .tool-frame { width: 100%; height: calc(100vh - 52px); border: none; background: #fff; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="tool-header">
    <a class="back-btn" href="../index.html">← Back</a>
    <span class="tool-title">⌒ Horizontal Curve Calculator</span>
  </div>
  <!--
    INSTRUCTIONS:
    Place your curve_calculator.html file in this pages/ folder,
    rename it to curve-calculator-tool.html, then uncomment the line below:

    <iframe class="tool-frame" src="curve-calculator-tool.html" title="Horizontal Curve Calculator"></iframe>

    OR simply paste all the content of curve_calculator.html below this comment.
  -->
  <div style="display:flex;align-items:center;justify-content:center;height:calc(100vh - 52px);color:#fff;text-align:center;padding:40px;">
    <div>
      <div style="font-size:48px;margin-bottom:20px">⌒</div>
      <h2 style="color:#00bfb3;margin-bottom:10px">Horizontal Curve Calculator</h2>
      <p style="color:rgba(255,255,255,.6);max-width:400px;line-height:1.7">
        Place your <code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px">curve_calculator.html</code>
        file in the <code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px">pages/</code>
        folder and update this page to load it.<br/><br/>
        See the README for full instructions.
      </p>
    </div>
  </div>
</body>
</html>
